# Example docker-compose.yml — httptape as a sidecar.
#
# Usage:
#   docker compose up serve        # replay fixtures
#   docker compose up record       # record against upstream

services:
  serve:
    image: ghcr.io/vibewarden/httptape:latest
    command:
      - serve
      - --fixtures=/fixtures
      - --port=8081
    ports:
      - "8081:8081"
    volumes:
      - ./fixtures:/fixtures:ro
      - ./config.json:/config/config.json:ro

  record:
    image: ghcr.io/vibewarden/httptape:latest
    command:
      - record
      - --upstream=https://api.example.com
      - --fixtures=/fixtures
      - --config=/config/config.json
      - --port=8081
    ports:
      - "8081:8081"
    volumes:
      - ./fixtures:/fixtures
      - ./config.json:/config/config.json:ro
